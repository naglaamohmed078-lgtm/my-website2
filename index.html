<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Ahmed & Mai</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght=0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --olive: #4a5d23; --pink: #d8a2a2; --cream: #fdfaf6; }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--cream); 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; 
            text-align: center;
            position: relative;
        }

        /* --- خلفية الفراشات والورد العايمة --- */
        .background-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            opacity: 0;
            animation: float 15s linear infinite;
            font-size: 20px;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* --- تنسيق المحتوى والمظروف --- */
        .envelope-section { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: var(--cream); 
            position: relative; 
            z-index: 2; 
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        .envelope { width: 280px; height: 180px; background: #fff; position: relative; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        .envelope::before { content: ''; position: absolute; top: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 90px solid var(--pink); z-index: 2; }
        .open-txt { z-index: 3; position: relative; margin-top: 50px; font-weight: 600; color: var(--olive); letter-spacing: 2px; }

        #main-content { 
            display: none; 
            opacity: 0; 
            transition: opacity 1.5s ease-in; 
            position: relative; 
            z-index: 1; 
        }
        
        section { padding: 80px 20px; min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .script { font-family: 'Great Vibes', cursive; color: var(--pink); font-size: 3.5rem; margin: 15px 0; }
        .serif { font-family: 'Playfair Display', serif; color: var(--olive); letter-spacing: 2px; }

        .countdown { display: flex; gap: 10px; margin: 30px 0; justify-content: center; }
        .count-item { background: white; padding: 15px; border-radius: 12px; min-width: 80px; border: 1px solid var(--pink); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .count-val { font-size: 2rem; font-weight: bold; color: var(--olive); display: block; }
        
        .btn-maps { background: var(--olive); color: white; padding: 14px 35px; text-decoration: none; border-radius: 50px; font-weight: 600; display: inline-block; margin-top: 20px; box-shadow: 0 4px 15px rgba(74, 93, 35, 0.2); cursor: default; }
        
        .guestbook { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #eee; font-family: inherit; }
        .send-btn { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="background-elements" id="bg-elements"></div>

    <section class="envelope-section" id="envelope-sec">
        <h2 class="serif" style="font-size: 1.2rem; margin-bottom: 25px;">A SPECIAL INVITATION</h2>
        <div class="envelope" onclick="revealInvitation()">
            <div class="open-txt">CLICK TO OPEN</div>
        </div>
    </section>

    <div id="main-content">
        <section>
            <p class="serif">SAVE THE DATE</p>
            <h1 class="script">Together Forever Starts Today</h1>
            <h2 class="serif" style="font-size: 3rem; margin: 20px 0;">Ahmed & Mai</h2>
            <h3 class="serif">JULY 2, 2026</h3>
            <p class="serif" style="font-weight: 600;">THURSDAY | 8:00 PM</p>
        </section>

        <section style="background-color: rgba(250, 248, 245, 0.7);">
            <h2 class="serif">The Countdown</h2>
            <div class="countdown">
                <div class="count-item"><span class="count-val" id="days">00</span><span>Days</span></div>
                <div class="count-item"><span class="count-val" id="hours">00</span><span>Hours</span></div>
                <div class="count-item"><span class="count-val" id="mins">00</span><span>Mins</span></div>
                <div class="count-item"><span class="count-val" id="secs">00</span><span>Secs</span></div>
            </div>
            <p class="script" style="font-size: 2rem;">We can't wait!</p>
        </section>

        <section>
            <i class="fa-solid fa-location-dot" style="font-size: 3rem; color: var(--pink); margin-bottom: 15px;"></i>
            <h2 class="serif">Royal Hall</h2>
            <p style="color: #666; font-style: italic; margin-top: 5px;">Location details will be shared soon</p>
            <span class="btn-maps">ROYAL HALL</span>
        </section>

        <section style="background-color: rgba(253, 250, 246, 0.7);">
            <h2 class="serif">Write a Wish</h2>
            <div class="guestbook">
                <input type="text" id="gName" placeholder="Your Name">
                <textarea id="gWish" rows="4" placeholder="Your beautiful wish..."></textarea>
                <button class="send-btn" onclick="alert('Thank you for your love!')">SEND WISH</button>
            </div>
        </section>

        <footer style="padding: 40px; color: #aaa; font-size: 0.8rem; letter-spacing: 2px;">
            AHMED & MAI | JULY 2026
        </footer>
    </div>

    <script>
        // دالة توليد الفراشات والورد في الخلفية بشكل عشوائي ومباشر
        function createBackground() {
            const bg = document.getElementById('bg-elements');
            const icons = ['🦋', '🌸', '✨', '🌿', '🌷'];
            for (let i = 0; i < 20; i++) {
                let span = document.createElement('span');
                span.className = 'floating-item';
                span.innerText = icons[Math.floor(Math.random() * icons.length)];
                span.style.left = Math.random() * 100 + 'vw';
                
                let delay = (Math.random() * 15) - 15; 
                span.style.animationDelay = delay + 's';
                
                span.style.fontSize = (Math.random() * 20 + 10) + 'px';
                bg.appendChild(span);
            }
        }
        createBackground();

        // دالة فتح المظروف بانسيابية
        function revealInvitation() {
            const envelopeSec = document.getElementById('envelope-sec');
            const content = document.getElementById('main-content');
            
            envelopeSec.style.opacity = '0';
            
            setTimeout(() => {
                envelopeSec.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => { content.style.opacity = '1'; }, 50);
            }, 800);
        }

        // العداد التنازلي المضبوط حتى نهاية يوم 2 يوليو 2026
        const weddingDate = new Date("July 2, 2026 23:59:59").getTime();
        
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            } else {
                document.querySelector('.countdown').innerHTML = "<p class='serif' style='font-size:1.5rem; color:var(--pink);'>The Big Day is Here!</p>";
            }
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
